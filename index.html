<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Visualizaciones - Infovis</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px; text-align: center; }
        h1 { color: #2c3e50; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .viz-section { margin-bottom: 50px; padding: 20px; border-bottom: 1px solid #eee; }
        h2 { color: #4A5BFF; } /* Color azul moderno como el que querías */
        iframe { border: none; border-radius: 10px; width: 100%; height: 500px; }
    </style>
</head>
<body>

    <h1>Materia: Infovis</h1>
    <p>Proyecto de Visualización de Datos</p>

    <div class="container">
        
        <div class="viz-section">
            <h2>1. Visualización con RAWGraphs</h2>
            <p>Descripción breve de lo que muestra este gráfico.</p>
            <div id="rawgraph-container">
                <img src="viz.svg" alt="Gráfico RAWGraphs" style="max-width:100%; height:auto;">
            </div>
        </div>

        <div class="viz-section">
            <h2>2. Visualización con Flourish</h2>
            <p>Rediseño de la gráfica de Florence Nightingale.</p>
            <div class="flourish-embed flourish-chart" data-src="visualisation/27964207"><script src="https://public.flourish.studio/resources/embed.js"></script><noscript><img src="https://public.flourish.studio/visualisation/27964207/thumbnail" width="100%" alt="visualization" /></noscript></div>
                <script src="https://public.flourish.studio/resources/embed.js"></script>
            </div>
        </div>

    </div>

</body>
</html>
